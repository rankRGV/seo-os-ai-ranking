<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SEO OS Command Center</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"><span></span><span></span><span></span></div>
        <div><strong>SEO OS</strong><small>AI SEO COMMAND CENTER</small></div>
      </div>
      <nav id="nav"></nav>
      <div class="system-card">
        <div class="system-row"><span>SYSTEM STATUS</span><strong id="sideHealth">Healthy</strong></div>
        <div class="healthbar"><i></i></div>
        <p><b></b><span id="sideStatusText">Managed scheduler ready</span></p>
      </div>
    </aside>

    <main class="shell">
      <header class="topbar">
        <div class="client-tabs">
          <span class="eyebrow">CLIENT</span>
          <button class="pill active" data-client="all"><i></i>All Clients</button>
        </div>
        <div class="top-actions">
          <span id="refreshed">Loading...</span>
          <button class="icon-btn" title="Notifications"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button>
          <div class="avatar">N</div>
        </div>
      </header>

      <section class="context-bar">
        <div>
          <div class="context-title"><span class="dot muted"></span><strong id="contextName">All Clients</strong></div>
          <p id="contextSubtitle">Discord → Hermes → SEO OS Dashboard</p>
        </div>
        <div class="context-metrics" id="contextMetrics"></div>
        <div class="status-pills">
          <span class="soft green" id="routingHealth">Both active</span>
          <span class="soft purple" id="approvalCount">0 pending</span>
          <button id="refreshBtn" class="refresh"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"></path><path d="M21 3v5h-5"></path></svg>Refresh data</button>
        </div>
      </section>

      <section id="view" class="content"></section>
    </main>
  </div>

  <template id="emptyState">
    <div class="empty">No rows for this view yet.</div>
  </template>

  <script src="/app.js"></script>
</body>
</html>
